name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `tsc -b` type-checks every project (it is the build, so it also proves
      # the types compile). lint / format / test follow.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
